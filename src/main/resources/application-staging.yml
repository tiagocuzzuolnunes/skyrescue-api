spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/skyrescue}
    username: ${DB_USERNAME:skyrescue}
    password: ${DB_PASSWORD:skyrescue}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  environment: staging
